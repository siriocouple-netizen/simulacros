<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulacro de Exámenes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;--bg2:#EEECEA;--bg3:#E4E2DE;
  --text:#1A1916;--text2:#6B6860;
  --border:#D5D3CE;
  --accent:#2563EB;--accent-bg:#EBF0FD;
  --green:#16A34A;--green-bg:#DCFCE7;
  --red:#DC2626;--red-bg:#FEE2E2;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:700px;margin:0 auto;padding:1.5rem 1rem 3rem}
.home-title{font-size:24px;font-weight:700;margin-bottom:2px}
.home-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.stat-card{background:var(--bg2);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)}
.stat-num{font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.section-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.mode-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;text-align:left;transition:all .15s;width:100%}
.mode-btn:hover,.mode-btn.active{border-color:var(--accent);background:var(--accent-bg)}
.mode-icon{font-size:20px;margin-bottom:6px}
.mode-name{font-size:14px;font-weight:600;color:var(--text)}
.mode-desc{font-size:12px;color:var(--text2);margin-top:2px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-label{font-size:12px;color:var(--text2);white-space:nowrap}
.tag{padding:5px 11px;border-radius:99px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .12s;font-family:'Space Grotesk',sans-serif}
.tag.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.start-btn{width:100%;padding:14px;border-radius:10px;background:var(--text);color:var(--bg);border:none;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:4px}
.start-btn:hover{opacity:.85}
.start-btn:disabled{opacity:.4;cursor:not-allowed}
.quiz{padding:1rem 0 2rem}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.quiz-back{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text2);padding:6px 10px;border-radius:8px;font-family:inherit}
.quiz-back:hover{background:var(--bg2)}
.quiz-progress-text{font-size:13px;color:var(--text2);font-family:'IBM Plex Mono',monospace}
.progress-bar{height:4px;background:var(--bg3);border-radius:99px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width .3s}
.q-meta{display:flex;gap:8px;margin-bottom:10px}
.q-tag{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;background:var(--accent-bg);color:var(--accent)}
.question-text{font-size:16px;font-weight:600;line-height:1.5;margin-bottom:1.25rem}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.option{padding:12px 16px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;font-size:14px;color:var(--text);transition:all .12s;display:flex;align-items:flex-start;gap:10px;line-height:1.45;background:var(--bg);text-align:left;width:100%;font-family:'Space Grotesk',sans-serif}
.option:hover:not(.disabled){border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.option.correct{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.option.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.option.show-correct{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.option.disabled{cursor:default}
.opt-letter{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;background:var(--bg2);padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:1px}
.explanation{background:var(--bg2);border-radius:10px;padding:14px;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:1rem;border-left:3px solid var(--green);display:none}
.explanation.wrong-exp{border-left-color:var(--red)}
.explanation.show{display:block}
.next-btn{width:100%;padding:13px;border-radius:10px;background:var(--text);color:var(--bg);border:none;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:none}
.next-btn.show{display:block}
.results{padding:1.5rem 0;text-align:center}
.score-circle{width:110px;height:110px;border-radius:50%;margin:0 auto 1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.score-circle.pass{background:var(--green-bg);color:var(--green);border:3px solid var(--green)}
.score-circle.fail{background:var(--red-bg);color:var(--red);border:3px solid var(--red)}
.score-circle .score-label{font-size:11px;font-weight:500;font-family:'Space Grotesk',sans-serif}
.results-title{font-size:20px;font-weight:700;margin-bottom:6px}
.results-sub{font-size:14px;color:var(--text2);margin-bottom:1.5rem}
.results-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.5rem}
.res-stat{background:var(--bg2);border-radius:10px;padding:12px;border:1px solid var(--border)}
.res-num{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.res-num.g{color:var(--green)}.res-num.r{color:var(--red)}.res-num.b{color:var(--accent)}
.res-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.review-list{text-align:left;margin-bottom:1.5rem}
.review-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.review-item{padding:10px 12px;border-radius:8px;background:var(--red-bg);border-left:3px solid var(--red);margin-bottom:6px;font-size:13px}
.review-correct{font-size:12px;color:var(--green);margin-top:4px;font-weight:500}
.res-btns{display:flex;gap:8px}
.res-btn{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--border);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--text);transition:all .12s}
.res-btn:hover{background:var(--bg2)}
.res-btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">

<div id="screen-home">
  <div style="padding:1.5rem 0">
    <div class="home-title">📚 Simulacro de Exámenes</div>
    <div class="home-sub">180 preguntas · 6 materias</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">180</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Hechas</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correctas</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-pct">—</div><div class="stat-label">% Acierto</div></div>
    </div>
    <div class="section-label">Modo de estudio</div>
    <div class="mode-grid">
      <button class="mode-btn active" onclick="setMode('todas',this)"><div class="mode-icon">📋</div><div class="mode-name">Todas</div><div class="mode-desc">180 preguntas mezcladas</div></button>
      <button class="mode-btn" onclick="setMode('materia',this)"><div class="mode-icon">📖</div><div class="mode-name">Por materia</div><div class="mode-desc">Filtra y estudia una materia</div></button>
      <button class="mode-btn" onclick="setMode('fallos',this)"><div class="mode-icon">🎯</div><div class="mode-name">Mis fallos</div><div class="mode-desc">Solo preguntas que fallaste</div></button>
    </div>
    <div id="filters-materia" class="filter-row" style="display:none">
      <span class="filter-label">Materia:</span>
      <span class="tag active" onclick="selMateria(this,'todas')">Todas</span>
      <span class="tag" onclick="selMateria(this,'Medios y Soporte')">Medios y Soporte</span>
      <span class="tag" onclick="selMateria(this,'RRPP')">RRPP</span>
      <span class="tag" onclick="selMateria(this,'Trabajo de Campo')">Trabajo de Campo</span>
      <span class="tag" onclick="selMateria(this,'Marketing Digital')">Marketing Digital</span>
      <span class="tag" onclick="selMateria(this,'Diseño y Lanzamiento')">Diseño y Lanzamiento</span>
      <span class="tag" onclick="selMateria(this,'Lanzamiento')">Lanzamiento</span>
    </div>
    <button class="start-btn" id="start-btn" onclick="startSession()">Empezar ↗</button>
  </div>
</div>

<div class="quiz hidden" id="screen-quiz">
  <div class="quiz-header">
    <button class="quiz-back" onclick="goHome()">← Salir</button>
    <span class="quiz-progress-text" id="q-progress">1/30</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="q-meta" id="q-meta"></div>
  <div class="question-text" id="q-text"></div>
  <div class="options" id="q-options"></div>
  <div class="explanation" id="q-explanation"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Siguiente →</button>
</div>

<div class="results hidden" id="screen-results">
  <div id="score-circle-wrap"></div>
  <div class="results-title" id="res-title"></div>
  <div class="results-sub" id="res-sub"></div>
  <div class="results-grid">
    <div class="res-stat"><div class="res-num g" id="res-ok">0</div><div class="res-lbl">Correctas</div></div>
    <div class="res-stat"><div class="res-num r" id="res-fail">0</div><div class="res-lbl">Falladas</div></div>
    <div class="res-stat"><div class="res-num b" id="res-total">0</div><div class="res-lbl">Total</div></div>
  </div>
  <div class="review-list" id="review-list"></div>
  <div class="res-btns">
    <button class="res-btn" onclick="goHome()">← Inicio</button>
    <button class="res-btn primary" onclick="startSession()">Repetir ↺</button>
  </div>
</div>

</div>

const ST={mode:'todas',materia:'todas',queue:[],idx:0,answered:false,sessionOk:0,sessionFail:0,sessionWrong:[],hist:{done:0,ok:0},fails:[]};

function loadState(){try{const s=JSON.parse(localStorage.getItem('sim2_state')||'{}');if(s.hist)ST.hist=s.hist;if(s.fails)ST.fails=s.fails;}catch(e){}}
function saveState(){try{localStorage.setItem('sim2_state',JSON.stringify({hist:ST.hist,fails:ST.fails}));}catch(e){}}
loadState();updateStats();

function showScreen(id){['screen-home','screen-quiz','screen-results'].forEach(s=>{document.getElementById(s).classList.toggle('hidden',s!==id);});}
function goHome(){updateStats();showScreen('screen-home');}

function setMode(mode,btn){
  ST.mode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('filters-materia').style.display=mode==='materia'?'flex':'none';
  const sb=document.getElementById('start-btn');
  if(mode==='fallos'){sb.textContent=ST.fails.length>0?`Repasar ${ST.fails.length} fallos ↗`:'Sin fallos aún ✓';sb.disabled=ST.fails.length===0;}
  else{sb.textContent='Empezar ↗';sb.disabled=false;}
}

function selMateria(el,m){
  document.querySelectorAll('#filters-materia .tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');ST.materia=m;
}

function updateStats(){
  document.getElementById('stat-done').textContent=ST.hist.done;
  document.getElementById('stat-correct').textContent=ST.hist.ok;
  document.getElementById('stat-pct').textContent=ST.hist.done>0?Math.round(ST.hist.ok/ST.hist.done*100)+'%':'—';
  if(ST.mode==='fallos'){const sb=document.getElementById('start-btn');sb.textContent=ST.fails.length>0?`Repasar ${ST.fails.length} fallos ↗`:'Sin fallos aún ✓';sb.disabled=ST.fails.length===0;}
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startSession(){
  let pool=[];
  if(ST.mode==='fallos') pool=QS.filter(q=>ST.fails.includes(q.id));
  else if(ST.mode==='materia') pool=ST.materia==='todas'?[...QS]:QS.filter(q=>q.m===ST.materia);
  else pool=[...QS];
  ST.queue=shuffle(pool);ST.idx=0;ST.sessionOk=0;ST.sessionFail=0;ST.sessionWrong=[];
  showScreen('screen-quiz');renderQuestion();
}

function renderQuestion(){
  const q=ST.queue[ST.idx],total=ST.queue.length;
  document.getElementById('q-progress').textContent=`${ST.idx+1}/${total}`;
  document.getElementById('progress-fill').style.width=`${(ST.idx/total)*100}%`;
  document.getElementById('q-meta').innerHTML=`<span class="q-tag">${q.m}</span>`;
  document.getElementById('q-text').textContent=q.q;
  const exp=document.getElementById('q-explanation');exp.className='explanation';exp.textContent='';
  const nb=document.getElementById('next-btn');nb.className='next-btn';nb.textContent=ST.idx===total-1?'Ver resultados →':'Siguiente →';
  ST.answered=false;
  const letters=['A','B','C','D'];
  const opts=document.getElementById('q-options');opts.innerHTML='';
  q.o.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option';
    btn.innerHTML=`<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick=()=>answer(i,q);
    opts.appendChild(btn);
  });
}

function answer(idx,q){
  if(ST.answered)return;ST.answered=true;
  const isCorrect=idx===q.c;
  document.querySelectorAll('.option').forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===q.c)b.classList.add(isCorrect&&i===idx?'correct':'show-correct');
    if(i===idx&&!isCorrect)b.classList.add('wrong');
  });
  const exp=document.getElementById('q-explanation');
  if(isCorrect){
    exp.className='explanation show';exp.textContent='✓ Correcto';
    ST.sessionOk++;ST.hist.ok++;ST.fails=ST.fails.filter(id=>id!==q.id);
  } else {
    exp.className='explanation wrong-exp show';exp.textContent=`✗ Incorrecto. La respuesta correcta es: ${q.o[q.c]}`;
    ST.sessionFail++;ST.sessionWrong.push(q);if(!ST.fails.includes(q.id))ST.fails.push(q.id);
  }
  ST.hist.done++;saveState();document.getElementById('next-btn').classList.add('show');
}

function nextQuestion(){
  ST.idx++;
  if(ST.idx>=ST.queue.length)showResults();else renderQuestion();
}

function showResults(){
  const total=ST.queue.length,ok=ST.sessionOk,pct=Math.round(ok/total*100),pass=pct>=50;
  document.getElementById('score-circle-wrap').innerHTML=`<div class="score-circle ${pass?'pass':'fail'}"><span>${pct}%</span><span class="score-label">${pass?'Aprobado':'A repasar'}</span></div>`;
  document.getElementById('res-title').textContent=pass?'¡Buen trabajo! 🎉':'Sigue practicando 💪';
  document.getElementById('res-sub').textContent=`Has respondido ${total} preguntas`;
  document.getElementById('res-ok').textContent=ok;document.getElementById('res-fail').textContent=ST.sessionFail;document.getElementById('res-total').textContent=total;
  const rl=document.getElementById('review-list');
  if(ST.sessionWrong.length>0){
    rl.innerHTML=`<div class="review-title">Preguntas falladas (${ST.sessionWrong.length})</div>`+ST.sessionWrong.map(q=>`<div class="review-item"><div>${q.q}</div><div class="review-correct">✓ ${q.o[q.c]}</div></div>`).join('');
  } else {
    rl.innerHTML=`<div style="text-align:center;padding:16px;color:var(--green);font-weight:600">¡Sin errores! Perfecto 🏆</div>`;
  }
  showScreen('screen-results');
}
</script>
</body>
</html>
